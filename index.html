<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菌活 Sleep Check</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🌙 菌活 Sleep Check</h1>
<p>食べることから、眠りを整える。</p>
<p class="sub">腸から整えて、やさしく眠る。</p>
</header>

<div class="card">

<h2>🦠 プレバイオチェック</h2>
<div id="pre"></div>

<h2>🦠 プロバイオチェック</h2>
<div id="pro"></div>

<h2>😴 睡眠時間</h2>
<input type="number" id="sleep" min="0" max="12" step="0.5">

<h2>✨ 朝の目覚め</h2>

<select id="wake">
<option value="1">★</option>
<option value="2">★★</option>
<option value="3">★★★</option>
<option value="4">★★★★</option>
<option value="5">★★★★★</option>
</select>

<button onclick="calc()">スコア計算</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
